version: '3.8'

services:
  # Development service
  lumina-essence-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lumina-essence-dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

  # Production service
  lumina-essence-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumina-essence-prod
    ports:
      - "8080:80"
    restart: unless-stopped
